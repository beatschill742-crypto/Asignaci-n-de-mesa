<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pases de Acceso - Bodas de Oro</title>
    
    <!-- Librerías de diseño y tipografías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dorado: #d4af37;
            --dorado-oscuro: #b38728;
            --dorado-claro: #fbf5b7;
            --blanco: #ffffff;
            --texto: #333333;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdfbf7;
            color: var(--texto);
            /* Fondo sutil floral/textura */
            background-image: radial-gradient(#d4af37 0.4px, transparent 0.4px);
            background-size: 24px 24px;
            background-attachment: fixed;
        }
        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        
        .ticket-container {
            background: var(--blanco);
            border-radius: 8px;
            box-shadow: 0 20px 40px -10px rgba(212, 175, 55, 0.15), 0 0 20px rgba(0,0,0,0.03);
            position: relative;
            overflow: hidden;
            border: 1px solid #f0e9d8;
        }

        /* Borde interior doble dorado */
        .ticket-inner-border {
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid var(--dorado);
            pointer-events: none;
            opacity: 0.4;
        }
        .ticket-inner-border::after {
            content: '';
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid var(--dorado);
            opacity: 0.2;
        }

        .gold-gradient-text {
            background: linear-gradient(135deg, #b38728, #d4af37, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen flex flex-col items-center justify-center p-4 py-8">
        <!-- El contenido se inyecta con JavaScript -->
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const container = document.getElementById('app-container');

        // SVG de ramas florales para las esquinas
        const cornerFloralSVG = `
            <svg viewBox="0 0 100 100" class="absolute w-12 h-12 text-[#d4af37] opacity-60" fill="currentColor">
                <path d="M10,10 Q30,15 40,30 Q25,35 10,20 Z" />
                <path d="M10,10 Q15,30 30,40 Q35,25 20,10 Z" />
                <circle cx="15" cy="15" r="3" />
                <path d="M10,10 Q40,40 60,60" stroke="currentColor" stroke-width="1.5" fill="none"/>
            </svg>
        `;

        // ========================================================
        // MODO 1: VALIDACIÓN (Pantalla Verde para la Hostess)
        // ========================================================
        if (urlParams.get('validar') === 'true') {
            const inv = decodeURIComponent(urlParams.get('invitado') || 'Invitado');
            const mes = decodeURIComponent(urlParams.get('mesa') || 'Mesa por asignar');

            container.innerHTML = `
                <div class="bg-white p-10 rounded-xl shadow-2xl border-4 border-[#d4af37] w-full max-w-sm text-center relative">
                    <div class="text-7xl mb-4">✨</div>
                    <h2 class="font-serif-elegant text-[#b38728] text-3xl mb-2 font-bold uppercase tracking-wide">Acceso Permitido</h2>
                    <p class="text-[10px] uppercase text-gray-400 tracking-[0.2em] mb-6 font-bold">Bodas de Oro Fede & Jovita</p>
                    
                    <div class="border-t border-[#d4af37] opacity-40 my-6"></div>
                    
                    <p class="text-[11px] text-gray-500 uppercase tracking-[0.2em] mb-2 font-semibold">Invitado Especial</p>
                    <p class="font-serif-elegant text-2xl font-bold mb-6 text-gray-800">${inv}</p>
                    
                    <div class="bg-gradient-to-r from-[#b38728] to-[#d4af37] text-white py-4 rounded-md shadow-lg border border-[#fbf5b7]/50">
                        <p class="text-3xl font-bold tracking-widest uppercase m-0">${mes}</p>
                    </div>
                </div>
            `;
        } 
        
        // ========================================================
        // MODO 2: VISUALIZACIÓN DEL INVITADO (Diseño Blanco y Dorado)
        // ========================================================
        else {
            let idParam = urlParams.get('id');
            
            if (!idParam) {
                container.innerHTML = `
                    <div class="bg-white p-10 rounded-xl shadow-xl text-center max-w-sm border-t-4 border-[#d4af37]">
                        <h2 class="text-2xl font-bold text-[#b38728] mb-4 font-serif-elegant">Enlace Inválido</h2>
                        <p class="text-gray-600">Por favor verifica que el enlace esté completo o contacta a los organizadores.</p>
                    </div>
                `;
            } else {
                idParam = idParam.trim();

                // Detectar el formato exacto del ID (nombre-mNumero)
                const match = idParam.match(/^(.*?)-m(\d+)$/i);
                
                if (match) {
                    const nombreEnBruto = match[1].replace(/-/g, ' ');
                    const nombreLimpio = nombreEnBruto.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    const numMesa = match[2];
                    const textoMesa = `Mesa ${numMesa}`;
                    
                    const baseUrl = window.location.href.split('?')[0];
                    const enlaceValidacion = `${baseUrl}?validar=true&invitado=${encodeURIComponent(nombreLimpio)}&mesa=${encodeURIComponent(textoMesa)}`;
                    const qrData = encodeURIComponent(enlaceValidacion);
                    // QR oscuro para que se lea bien, fondo transparente/blanco
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=333333&bgcolor=ffffff&data=${qrData}`;

                    container.innerHTML = `
                        <div class="ticket-container w-full max-w-[380px]">
                            <div class="ticket-inner-border"></div>
                            
                            <!-- Flores en las esquinas -->
                            <div class="absolute top-2 left-2 w-16 h-16">${cornerFloralSVG}</div>
                            <div class="absolute top-2 right-2 w-16 h-16 transform scale-x-[-1]">${cornerFloralSVG}</div>
                            <div class="absolute bottom-2 left-2 w-16 h-16 transform scale-y-[-1]">${cornerFloralSVG}</div>
                            <div class="absolute bottom-2 right-2 w-16 h-16 transform scale-x-[-1] scale-y-[-1]">${cornerFloralSVG}</div>
                            
                            <div class="p-8 py-12 text-center relative z-10">
                                <!-- Corona y Gran 50 -->
                                <div class="relative flex justify-center items-center my-2 h-32">
                                    <svg class="absolute w-40 h-40 opacity-70" viewBox="0 0 100 100">
                                        <!-- Rama Izquierda -->
                                        <path d="M 50 90 C 15 90 5 45 15 20 C 20 35 30 40 35 45 C 20 45 15 60 25 75 C 35 75 45 80 50 90" fill="none" stroke="#d4af37" stroke-width="1.5"/>
                                        <path d="M 15 20 Q 10 10 20 5 Q 25 15 15 20" fill="#d4af37"/>
                                        <path d="M 10 35 Q 5 25 15 20 Q 20 30 10 35" fill="#d4af37"/>
                                        <path d="M 12 55 Q 5 45 15 40 Q 22 50 12 55" fill="#d4af37"/>
                                        <path d="M 18 70 Q 12 60 22 55 Q 28 65 18 70" fill="#d4af37"/>
                                        <!-- Rama Derecha -->
                                        <path d="M 50 90 C 85 90 95 45 85 20 C 80 35 70 40 65 45 C 80 45 85 60 75 75 C 65 75 55 80 50 90" fill="none" stroke="#d4af37" stroke-width="1.5"/>
                                        <path d="M 85 20 Q 90 10 80 5 Q 75 15 85 20" fill="#d4af37"/>
                                        <path d="M 90 35 Q 95 25 85 20 Q 80 30 90 35" fill="#d4af37"/>
                                        <path d="M 88 55 Q 95 45 85 40 Q 78 50 88 55" fill="#d4af37"/>
                                        <path d="M 82 70 Q 88 60 78 55 Q 72 65 82 70" fill="#d4af37"/>
                                    </svg>
                                    <span class="font-serif-elegant text-7xl gold-gradient-text font-bold z-10 -mt-2">50</span>
                                </div>

                                <p class="font-serif-elegant text-[10px] uppercase tracking-[0.4em] text-[#b38728] font-bold mt-2 mb-1">Bodas de Oro</p>
                                <h1 class="font-cursive text-5xl leading-tight gold-gradient-text mb-4 mt-2">Fede & Jovita</h1>
                                
                                <p class="text-[9px] text-gray-400 uppercase tracking-[0.25em] font-medium mb-6">31 de Mayo 2026</p>
                                
                                <!-- Divisor elegante dorado -->
                                <div class="flex items-center justify-center my-6 opacity-60">
                                    <div class="w-16 h-[1px] bg-[#d4af37]"></div>
                                    <div class="mx-3 text-[#d4af37] text-sm">❀</div>
                                    <div class="w-16 h-[1px] bg-[#d4af37]"></div>
                                </div>
                                
                                <!-- Información del Invitado -->
                                <div class="mb-6 bg-[#fffdf9] p-4 rounded-lg border border-[#d4af37]/20 shadow-sm relative z-20">
                                    <p class="text-[8px] uppercase tracking-[0.2em] text-[#b38728] mb-2 font-bold">Pase de Acceso para</p>
                                    <p class="font-serif-elegant text-2xl text-gray-800 font-bold mb-3 px-2 leading-snug">${nombreLimpio}</p>
                                    
                                    <div class="bg-gradient-to-r from-[#d4af37] to-[#b38728] rounded py-2 px-8 inline-block shadow-md">
                                        <p class="font-bold uppercase tracking-[0.2em] text-white text-sm m-0">${textoMesa}</p>
                                    </div>
                                </div>
                                
                                <!-- Código QR -->
                                <div class="flex flex-col items-center justify-center mt-4">
                                    <div class="p-3 bg-white border border-[#d4af37]/40 rounded-lg shadow-md mb-3 relative">
                                        <!-- Mini esquinas doradas en el QR -->
                                        <div class="absolute top-1 left-1 w-2 h-2 border-t-2 border-l-2 border-[#d4af37]"></div>
                                        <div class="absolute top-1 right-1 w-2 h-2 border-t-2 border-r-2 border-[#d4af37]"></div>
                                        <div class="absolute bottom-1 left-1 w-2 h-2 border-b-2 border-l-2 border-[#d4af37]"></div>
                                        <div class="absolute bottom-1 right-1 w-2 h-2 border-b-2 border-r-2 border-[#d4af37]"></div>
                                        
                                        <img src="${qrUrl}" alt="Código QR de Acceso" class="w-36 h-36 relative z-10">
                                    </div>
                                    <p class="text-[8px] uppercase tracking-[0.25em] text-[#b38728] font-semibold">Mostrar código en recepción</p>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="bg-white p-10 rounded-xl shadow-xl text-center max-w-sm border-t-4 border-[#d4af37]">
                            <h2 class="text-2xl font-bold text-[#b38728] mb-4 font-serif-elegant">Pase no encontrado</h2>
                            <p class="text-gray-600 mb-4 text-sm">El formato del enlace no es válido.</p>
                            <div class="bg-gray-50 text-[10px] text-gray-400 p-3 rounded break-all border border-gray-200">
                                Info técnica: <span class="font-mono text-red-900">${idParam}</span>
                            </div>
                        </div>
                    `;
                }
            }
        }
    </script>
</body>
</html>
