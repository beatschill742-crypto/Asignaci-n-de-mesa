<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pases de Acceso - Bodas de Oro</title>
    
    <!-- Librerías de diseño y tipografías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --vino: #600000;
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdf2f2;
            color: #1a1a1a;
            background-image: 
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 50c0-5 5-10 10-10s10 5 10 10-5 10-10 10-10-5-10-10z' fill='%23600000' fill-opacity='0.03'/%3E%3C/svg%3E"),
                linear-gradient(to bottom, #fdf2f2, #f5e6e6);
            background-attachment: fixed;
        }
        .font-serif-elegant { font-family: 'Cinzel', serif; }
        
        .gold-text {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .premium-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(96,0,0,0.15);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(96,0,0,0.1);
        }
        
        .premium-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: var(--gold-gradient);
        }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen flex flex-col items-center justify-center p-4 py-12">
        <!-- El contenido se inyecta con JavaScript -->
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const container = document.getElementById('app-container');

        // ========================================================
        // MODO 1: VALIDACIÓN (Pantalla Verde para la Hostess)
        // ========================================================
        if (urlParams.get('validar') === 'true') {
            const inv = decodeURIComponent(urlParams.get('invitado') || 'Invitado');
            const mes = decodeURIComponent(urlParams.get('mesa') || 'Mesa por asignar');

            container.innerHTML = `
                <div class="bg-white p-10 rounded-2xl shadow-2xl border-4 border-[#600000] w-full max-w-sm text-center relative animate-fade-in">
                    <div class="text-7xl mb-4 drop-shadow-lg">✅</div>
                    <h2 class="font-serif-elegant text-[#600000] text-3xl mb-2 font-bold uppercase tracking-wide">Acceso Permitido</h2>
                    <p class="text-[10px] uppercase text-gray-400 tracking-[0.2em] mb-6 font-bold">Bodas de Oro Fede & Jovita</p>
                    
                    <div class="border-t-2 border-dashed border-[#600000] opacity-20 my-6"></div>
                    
                    <p class="text-[11px] text-gray-500 uppercase tracking-[0.2em] mb-2 font-semibold">Invitado</p>
                    <p class="font-serif-elegant text-2xl font-bold mb-6 text-gray-800">${inv}</p>
                    
                    <div class="bg-[#600000] text-white py-4 rounded-xl shadow-inner border border-yellow-600/30">
                        <p class="text-3xl font-bold tracking-widest uppercase m-0">${mes}</p>
                    </div>
                </div>
            `;
        } 
        
        // ========================================================
        // MODO 2: VISUALIZACIÓN DEL INVITADO (Diseño Premium)
        // ========================================================
        else {
            let idParam = urlParams.get('id');
            
            if (!idParam) {
                container.innerHTML = `
                    <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-sm border-t-4 border-red-700">
                        <h2 class="text-2xl font-bold text-red-700 mb-4 font-serif-elegant">Enlace Inválido</h2>
                        <p class="text-gray-600">Por favor verifica que el enlace esté completo o contacta a los organizadores.</p>
                    </div>
                `;
            } else {
                idParam = idParam.trim();

                // Fórmula para leer los enlaces y no confundirse con apellidos con "M"
                const match = idParam.match(/^(.*?)-m(\d+)$/i);
                
                if (match) {
                    const nombreEnBruto = match[1].replace(/-/g, ' ');
                    const nombreLimpio = nombreEnBruto.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    const numMesa = match[2];
                    const textoMesa = `Mesa ${numMesa}`;
                    
                    const baseUrl = window.location.href.split('?')[0];
                    const enlaceValidacion = `${baseUrl}?validar=true&invitado=${encodeURIComponent(nombreLimpio)}&mesa=${encodeURIComponent(textoMesa)}`;
                    const qrData = encodeURIComponent(enlaceValidacion);
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=600000&data=${qrData}`;

                    container.innerHTML = `
                        <div class="premium-card w-full max-w-[380px] p-8 text-center">
                            <!-- Header de la tarjeta -->
                            <h3 class="font-serif-elegant font-bold text-[11px] uppercase tracking-[0.3em] gold-text mb-3">Pase de Acceso</h3>
                            <h1 class="font-serif-elegant text-3xl sm:text-4xl text-[#600000] font-bold mb-1">Fede & Jovita</h1>
                            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-2 font-semibold">Bodas de Oro • 31 de Mayo 2026</p>
                            
                            <!-- Separador -->
                            <div class="flex items-center justify-center my-6">
                                <div class="w-16 h-px bg-gray-300"></div>
                                <div class="mx-4 text-[#bf953f] text-lg font-serif-elegant">❦</div>
                                <div class="w-16 h-px bg-gray-300"></div>
                            </div>
                            
                            <!-- Zona del QR -->
                            <div class="flex flex-col items-center justify-center mb-8">
                                <div class="bg-white p-3 rounded-xl shadow-md border border-gray-100 mb-3 relative group">
                                    <!-- Esquinas decorativas del QR -->
                                    <div class="absolute top-0 left-0 w-3 h-3 border-t-2 border-l-2 border-[#b38728] rounded-tl-lg"></div>
                                    <div class="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-[#b38728] rounded-tr-lg"></div>
                                    <div class="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-[#b38728] rounded-bl-lg"></div>
                                    <div class="absolute bottom-0 right-0 w-3 h-3 border-b-2 border-r-2 border-[#b38728] rounded-br-lg"></div>
                                    
                                    <img src="${qrUrl}" alt="Código QR de Acceso" class="w-48 h-48 sm:w-56 sm:h-56">
                                </div>
                                <p class="text-[9px] uppercase tracking-[0.3em] text-gray-400 font-semibold italic bg-[#fdf2f2] px-4 py-1 rounded-full">Mostrar a la hostess</p>
                            </div>
                            
                            <!-- Datos del Invitado -->
                            <div class="bg-[#fdf2f2]/50 p-4 rounded-lg border border-red-900/5">
                                <p class="text-[9px] text-gray-500 uppercase tracking-[0.2em] mb-1 font-bold">Invitado Especial</p>
                                <p class="font-serif-elegant text-2xl text-[#600000] font-bold mb-3 leading-tight">${nombreLimpio}</p>
                                
                                <div class="inline-block px-8 py-2 bg-[#600000] rounded text-white shadow-md border border-[#800000]">
                                    <p class="text-sm uppercase font-bold tracking-[0.2em]">${textoMesa}</p>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-sm border-t-4 border-red-700">
                            <h2 class="text-2xl font-bold text-red-700 mb-4 font-serif-elegant">Pase no encontrado</h2>
                            <p class="text-gray-600 mb-4 text-sm">No pudimos localizar este pase. Verifica tu enlace de WhatsApp.</p>
                            <div class="bg-gray-50 text-[10px] text-gray-400 p-3 rounded break-all border border-gray-200">
                                Info técnica: <span class="font-mono text-red-900">${idParam}</span>
                            </div>
                        </div>
                    `;
                }
            }
        }
    </script>
</body>
</html>
