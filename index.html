<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pases de Acceso - Bodas de Oro</title>
    
    <!-- Librerías de diseño y tipografías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --vino: #600000;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #fdf2f2;
            color: #1a1a1a;
            background-image: linear-gradient(to bottom, #fdf2f2, #f5e6e6);
        }
        .font-serif-elegant { font-family: 'Cinzel', serif; }
        
        .ticket {
            position: relative;
            background: white;
            padding: 2rem;
            border: 2px solid var(--vino);
            max-width: 400px;
            width: 100%;
            margin: 0 auto 2rem auto;
            box-shadow: 0 15px 40px rgba(96,0,0,0.1);
            border-radius: 4px;
        }
        .ticket::before, .ticket::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30px;
            height: 30px;
            background: #fdf2f2;
            border: 2px solid var(--vino);
            border-radius: 50%;
            transform: translateY(-50%);
            z-index: 2;
        }
        .ticket::before { left: -16px; border-left-color: transparent; }
        .ticket::after { right: -16px; border-right-color: transparent; }
        
        .ticket-divider { border-top: 2px dashed var(--vino); margin: 1.5rem 0; opacity: 0.2; }
        .vino-name { color: var(--vino); }
    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen flex flex-col items-center justify-center p-6 py-12">
        <!-- El contenido se inyecta con JavaScript -->
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const container = document.getElementById('app-container');

        // ========================================================
        // MODO 1: VALIDACIÓN (Pantalla Verde para la Hostess)
        // ========================================================
        if (urlParams.get('validar') === 'true') {
            const inv = decodeURIComponent(urlParams.get('invitado') || 'Invitado');
            const mes = decodeURIComponent(urlParams.get('mesa') || 'Mesa por asignar');

            container.innerHTML = `
                <div class="bg-white p-10 rounded-2xl shadow-2xl border-4 border-[#600000] w-full max-w-sm text-center relative animate-fade-in">
                    <div class="text-7xl mb-4 drop-shadow-lg">✅</div>
                    <h2 class="font-serif-elegant text-[#600000] text-3xl mb-2 font-bold uppercase tracking-wide">Acceso Permitido</h2>
                    <p class="text-[10px] uppercase text-gray-400 tracking-[0.2em] mb-6">Bodas de Oro Fede & Jovita</p>
                    
                    <div class="border-t-2 border-dashed border-[#600000] opacity-20 my-6"></div>
                    
                    <p class="text-[11px] text-gray-500 uppercase tracking-[0.2em] mb-2 font-semibold">Invitado</p>
                    <p class="font-serif-elegant text-2xl font-bold mb-6 text-gray-800">${inv}</p>
                    
                    <div class="bg-[#600000] text-white py-4 rounded-xl mb-6 shadow-inner">
                        <p class="text-3xl font-bold tracking-widest uppercase m-0">${mes}</p>
                    </div>
                </div>
            `;
        } 
        
        // ========================================================
        // MODO 2: VISUALIZACIÓN DEL INVITADO (Boletos y QR)
        // ========================================================
        else {
            let idParam = urlParams.get('id');
            
            if (!idParam) {
                container.innerHTML = `
                    <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-sm">
                        <h2 class="text-2xl font-bold text-red-700 mb-4">Enlace Inválido</h2>
                        <p class="text-gray-600">Por favor verifica que el enlace esté completo o contacta a los organizadores.</p>
                    </div>
                `;
            } else {
                // Limpiamos espacios en blanco accidentales
                idParam = idParam.trim();

                // Fórmula mágica: Busca todo hasta llegar a "-m" seguido de números
                // Esto permite que apellidos con "M" no rompan el sistema.
                const match = idParam.match(/^(.*?)-m(\d+)$/i);
                
                if (match) {
                    // Extraemos el nombre y limpiamos guiones
                    const nombreEnBruto = match[1].replace(/-/g, ' ');
                    
                    // Capitalizamos el nombre para que se vea elegante (ej. fernanda robles -> Fernanda Robles)
                    const nombreLimpio = nombreEnBruto.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    
                    // Extraemos la mesa
                    const numMesa = match[2];
                    const textoMesa = `Mesa ${numMesa}`;
                    
                    // Toma la URL base para generar el QR dinámico que escaneará la hostess
                    const baseUrl = window.location.href.split('?')[0];

                    let html = `<h2 class="font-serif-elegant text-4xl text-center vino-name mb-10 uppercase font-bold drop-shadow-sm">Pase de Acceso</h2>`;

                    // Link exacto al que te lleva el QR cuando la hostess lo escanea
                    const enlaceValidacion = `${baseUrl}?validar=true&invitado=${encodeURIComponent(nombreLimpio)}&mesa=${encodeURIComponent(textoMesa)}`;
                    const qrData = encodeURIComponent(enlaceValidacion);
                    
                    // Generador de QR oficial
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=600000&data=${qrData}`;

                    html += `
                        <div class="ticket">
                            <div class="flex justify-between items-center mb-4">
                                <span class="font-serif-elegant text-[10px] uppercase text-gray-500 font-bold tracking-wider">Bodas de Oro</span>
                                <span class="font-serif-elegant text-[10px] uppercase text-gray-500 font-bold tracking-wider">31.05.2026</span>
                            </div>
                            <h4 class="font-serif-elegant text-2xl mb-1 vino-name text-center font-bold">Fede & Jovita</h4>
                            <div class="ticket-divider"></div>
                            
                            <p class="font-serif-elegant text-2xl vino-name mb-1 text-center font-bold leading-tight mt-4">${nombreLimpio}</p>
                            <p class="text-[16px] uppercase text-gray-800 font-bold tracking-[0.1em] mb-4 text-center mt-2">${textoMesa}</p>
                            
                            <div class="ticket-divider"></div>
                            <div class="flex flex-col items-center gap-3 mt-4">
                                <img src="${qrUrl}" alt="QR Code" class="w-44 h-44 p-2 border-2 border-gray-100 shadow-sm rounded-lg bg-white">
                                <p class="text-[9px] uppercase tracking-[0.3em] text-gray-400 italic text-center mt-2">Mostrar a la hostess en recepción</p>
                            </div>
                        </div>
                    `;
                    
                    container.innerHTML = html;
                } else {
                    // Pantalla de error con información para depurar
                    container.innerHTML = `
                        <div class="bg-white p-10 rounded-2xl shadow-xl text-center max-w-sm">
                            <h2 class="text-2xl font-bold text-red-700 mb-4">Pase no encontrado</h2>
                            <p class="text-gray-600 mb-4">No pudimos localizar este pase. Verifica tu enlace de WhatsApp.</p>
                            <div class="bg-gray-100 text-xs text-gray-500 p-3 rounded break-all border border-gray-200 mt-4">
                                <b>Error:</b> Formato incorrecto.<br>
                                Texto leído: <span class="text-red-800 font-mono">${idParam}</span>
                            </div>
                        </div>
                    `;
                }
            }
        }
    </script>
</body>
</html>
