<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pases de Acceso - Bodas de Oro</title>
    
    <!-- Librerías de diseño y tipografías -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --vino: #600000;
            --dorado: #d4af37;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f7f3f0;
            color: #1a1a1a;
            /* Fondo sutil con textura elegante */
            background-image: radial-gradient(#d4af37 0.5px, transparent 0.5px), radial-gradient(#d4af37 0.5px, #f7f3f0 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            background-attachment: fixed;
            opacity: 0.95;
        }
        .font-serif-elegant { font-family: 'Cinzel', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        
        .ticket-container {
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 25px 50px -12px rgba(96, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        /* Borde interior dorado */
        .ticket-inner-border {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid var(--dorado);
            pointer-events: none;
            opacity: 0.6;
        }

        /* Adornos en las esquinas */
        .corner-tl, .corner-tr, .corner-bl, .corner-br {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--dorado);
            border-style: solid;
        }
        .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

    </style>
</head>
<body>
    <div id="app-container" class="min-h-screen flex flex-col items-center justify-center p-4 py-8">
        <!-- El contenido se inyecta con JavaScript -->
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const container = document.getElementById('app-container');

        // ========================================================
        // MODO 1: VALIDACIÓN (Pantalla Verde para la Hostess)
        // ========================================================
        if (urlParams.get('validar') === 'true') {
            const inv = decodeURIComponent(urlParams.get('invitado') || 'Invitado');
            const mes = decodeURIComponent(urlParams.get('mesa') || 'Mesa por asignar');

            container.innerHTML = `
                <div class="bg-white p-10 rounded-xl shadow-2xl border-4 border-[#600000] w-full max-w-sm text-center relative">
                    <div class="text-7xl mb-4">✅</div>
                    <h2 class="font-serif-elegant text-[#600000] text-3xl mb-2 font-bold uppercase tracking-wide">Acceso Permitido</h2>
                    <p class="text-[10px] uppercase text-gray-400 tracking-[0.2em] mb-6 font-bold">Bodas de Oro Fede & Jovita</p>
                    
                    <div class="border-t border-[#d4af37] opacity-40 my-6"></div>
                    
                    <p class="text-[11px] text-gray-500 uppercase tracking-[0.2em] mb-2 font-semibold">Invitado</p>
                    <p class="font-serif-elegant text-2xl font-bold mb-6 text-gray-800">${inv}</p>
                    
                    <div class="bg-[#600000] text-white py-4 rounded-md shadow-inner border border-[#d4af37]/30">
                        <p class="text-3xl font-bold tracking-widest uppercase m-0">${mes}</p>
                    </div>
                </div>
            `;
        } 
        
        // ========================================================
        // MODO 2: VISUALIZACIÓN DEL INVITADO (Diseño Fiel a la Imagen)
        // ========================================================
        else {
            let idParam = urlParams.get('id');
            
            if (!idParam) {
                container.innerHTML = `
                    <div class="bg-white p-10 rounded-xl shadow-xl text-center max-w-sm border-t-4 border-[#600000]">
                        <h2 class="text-2xl font-bold text-[#600000] mb-4 font-serif-elegant">Enlace Inválido</h2>
                        <p class="text-gray-600">Por favor verifica que el enlace esté completo o contacta a los organizadores.</p>
                    </div>
                `;
            } else {
                idParam = idParam.trim();

                // Detectar el formato exacto del ID (nombre-mNumero)
                const match = idParam.match(/^(.*?)-m(\d+)$/i);
                
                if (match) {
                    const nombreEnBruto = match[1].replace(/-/g, ' ');
                    const nombreLimpio = nombreEnBruto.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
                    const numMesa = match[2];
                    const textoMesa = `Mesa ${numMesa}`;
                    
                    const baseUrl = window.location.href.split('?')[0];
                    const enlaceValidacion = `${baseUrl}?validar=true&invitado=${encodeURIComponent(nombreLimpio)}&mesa=${encodeURIComponent(textoMesa)}`;
                    const qrData = encodeURIComponent(enlaceValidacion);
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&color=000000&bgcolor=ffffff&data=${qrData}`;

                    container.innerHTML = `
                        <div class="ticket-container w-full max-w-[360px]">
                            <!-- Borde dorado decorativo -->
                            <div class="ticket-inner-border"></div>
                            <div class="corner-tl"></div>
                            <div class="corner-tr"></div>
                            <div class="corner-bl"></div>
                            <div class="corner-br"></div>

                            <!-- Franja superior de color Vino -->
                            <div class="bg-[#600000] h-6 w-full"></div>
                            
                            <div class="p-8 pb-10 text-center relative z-10">
                                <!-- Encabezado -->
                                <p class="font-serif-elegant text-[9px] uppercase tracking-[0.4em] text-[#d4af37] font-bold mb-3">Recepción</p>
                                
                                <h1 class="font-cursive text-[3.5rem] leading-none text-[#600000] mb-2 drop-shadow-sm">Fede & Jovita</h1>
                                <p class="text-[9px] text-gray-500 uppercase tracking-[0.25em] font-medium mb-6">Bodas de Oro • 31 de Mayo 2026</p>
                                
                                <!-- Divisor elegante -->
                                <div class="flex items-center justify-center my-6 opacity-60">
                                    <div class="w-12 h-[1px] bg-[#d4af37]"></div>
                                    <div class="mx-3 text-[#d4af37] text-xs font-serif-elegant">✧</div>
                                    <div class="w-12 h-[1px] bg-[#d4af37]"></div>
                                </div>
                                
                                <!-- Información del Invitado -->
                                <div class="mb-6">
                                    <p class="text-[8px] uppercase tracking-[0.2em] text-gray-400 mb-2 font-bold">Pase de Acceso para</p>
                                    <p class="font-serif-elegant text-xl text-[#1a1a1a] font-bold mb-3 px-2 leading-snug">${nombreLimpio}</p>
                                    
                                    <div class="bg-[#fcfafa] border border-[#d4af37]/40 rounded-sm py-2 px-6 inline-block shadow-sm">
                                        <p class="font-bold uppercase tracking-[0.15em] text-[#600000] text-sm m-0">${textoMesa}</p>
                                    </div>
                                </div>
                                
                                <!-- Código QR -->
                                <div class="flex flex-col items-center justify-center mt-2">
                                    <div class="p-2 bg-white border border-gray-200 rounded-md shadow-sm mb-3">
                                        <img src="${qrUrl}" alt="Código QR de Acceso" class="w-40 h-40">
                                    </div>
                                    <p class="text-[8px] uppercase tracking-[0.2em] text-[#600000] font-semibold">Mostrar código en la entrada</p>
                                </div>
                            </div>

                            <!-- Franja inferior de color Vino -->
                            <div class="bg-[#600000] h-4 w-full"></div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="bg-white p-10 rounded-xl shadow-xl text-center max-w-sm border-t-4 border-[#600000]">
                            <h2 class="text-2xl font-bold text-[#600000] mb-4 font-serif-elegant">Pase no encontrado</h2>
                            <p class="text-gray-600 mb-4 text-sm">El formato del enlace no es válido.</p>
                            <div class="bg-gray-50 text-[10px] text-gray-400 p-3 rounded break-all border border-gray-200">
                                Info técnica: <span class="font-mono text-red-900">${idParam}</span>
                            </div>
                        </div>
                    `;
                }
            }
        }
    </script>
</body>
</html>
